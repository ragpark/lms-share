  - ac: AC2
    type: component_or_e2e
    path: src/MyPacks.test.jsx
    owner: Engineering
    status: passing
  - ac: AC3
    type: integration
    path: server/packsRoutes.test.js, server/packsStore.test.js, src/PackBuilder.test.jsx
    owner: Engineering
    status: passing
  - ac: AC4
    type: component
    path: src/PackBuilder.test.jsx
    owner: Engineering
    status: passing
  - ac: AC5
    type: regression
    path: src/PackViewer.test.jsx
    owner: Engineering
    status: passing
guardrails:
  performance_budget: My packs should load quickly for a normal teacher account; exact budget TBD during architecture review.
  browser_support: Match existing LMS Share browser support.
  dependency_policy: Prefer existing stack unless architecture review approves a new dependency.
  backward_compatibility: Existing generated share URLs must continue to work.
  railway_storage: Production saved-pack data must use the configured Railway persistent volume, not ephemeral filesystem storage.
  no_accounts_in_v1: Do not build teacher accounts/login; ownership is the owner_token model decided below.
  no_delete_archive_in_v1: Do not add delete/archive or a real retention policy; deferred to a follow-up spec.
  documentation_required: true
implementation:
  tasks:
    - id: TASK1
      description: >-
        Add the owner_token column/migration and mint/store the token client-side per the
        decided session/browser-based ownership model (no accounts).
      owner: Engineering
      status: done
    - id: TASK2
      description: Finalize Builder and My packs UI states.
      owner: Design
      status: done
    - id: TASK3
      description: >-
        Define database migration and API routes (PUT /api/packs/:id, GET /api/my-packs) with
        owner-token auth.
      owner: Architecture and engineering
      status: done
    - id: TASK4
      description: >-
        Implement save, list, reopen, and update-in-place flows (same share URL) with tests.
      owner: Engineering
      status: done
open_questions: []
decisions:
  - date: 2026-07-05
    decision: Treat saved packs as a distinct product workflow that needs identity and persistence decisions before build.
    options_considered:
      - Anonymous browser-only saves
      - Private account-based saves
      - Shared-link-only reuse
    owner: Product owner
  - date: 2026-07-05
    decision: >-
      Ownership: no teacher accounts in v1. Use a random owner_token minted client-side on save,
      stored in localStorage, sent as a bearer credential on PUT/GET-my-packs. No auth/session
      system exists in the app today, and building one is out of proportion to this feature.
    options_considered:
      - Local browser/session-token ownership
      - Full account system with login
      - No ownership (fully public my-packs)
    owner: Product owner
  - date: 2026-07-05
    decision: >-
      Editing a saved pack updates it in place (same id, same share URL) rather than creating a
      new version, matching AC3 and the goal of preserving existing share-link behavior.
    options_considered:
      - Update in place
      - Create a new pack + new share URL per save
      - Keep version history
    owner: Product owner
  - date: 2026-07-05
    decision: Delete/archive is out of scope for the first release; deferred to a follow-up spec.
    options_considered:
      - Ship delete/archive in v1
      - Defer to a follow-up spec
    owner: Product owner
  - date: 2026-07-05
    decision: >-
      Retention: saved packs and existing anonymous packs are retained indefinitely in v1, no
      automatic expiry. A real retention/delete policy is deferred alongside delete/archive.
    options_considered:
      - Indefinite retention
      - Time-boxed expiry
      - Defer policy to follow-up spec
    owner: Product owner
