<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LMS Share</title>
    <style>
      body {
        box-sizing: border-box;
        width: 320px;
        margin: 0;
        padding: 16px;
        color: #1a1a1a;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 18px;
      }

      .label {
        margin: 12px 0 4px;
        color: #475569;
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      .value {
        overflow-wrap: anywhere;
        color: #1f2937;
        font-size: 13px;
        line-height: 1.4;
      }

      .url {
        color: #64748b;
      }

      .actions {
        display: grid;
        gap: 8px;
        margin-top: 16px;
      }

      button {
        padding: 10px 12px;
        border: 0;
        border-radius: 6px;
        background: #2563eb;
        color: #fff;
        cursor: pointer;
        font: inherit;
        font-size: 14px;
        font-weight: 600;
      }

      button.secondary {
        border: 1px solid #cbd5e1;
        background: #fff;
        color: #334155;
      }

      button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }

      .error {
        margin-top: 12px;
        color: #b91c1c;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <h1>LMS Share</h1>

    <div class="label">Current page</div>
    <div id="pageTitle" class="value">Loading…</div>

    <div class="label">URL</div>
    <div id="pageUrl" class="value url">Loading…</div>

    <div class="actions">
      <button id="addButton" type="button" disabled>Add to Lesson Pack</button>
      <button id="openButton" class="secondary" type="button">Open Builder</button>
    </div>

    <div id="error" class="error" role="alert" hidden></div>

    <script src="popup.js"></script>
  </body>
</html>
